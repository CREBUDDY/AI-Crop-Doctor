name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Lint with Ruff
      run: ruff check .
    - name: Run Tests
      run: pytest tests/ -v
      env:
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        cache: 'npm'
        cache-dependency-path: './frontend/package.json'
    - name: Install dependencies
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Build and Code Split Check
      run: npm run build

  build-and-deploy:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker Images
      run: |
        docker build -t aicropdoctor/backend:latest ./backend
        docker build -t aicropdoctor/frontend:latest ./frontend
    - name: Push to Registry
      run: echo "Docker Push goes here"
    - name: Trigger Deployment
      run: echo "Deployment webhook goes here"
